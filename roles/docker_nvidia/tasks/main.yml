---
# ─── Install Docker ──────────────────────────────
- name: Check if Docker is installed
  command: docker --version
  register: docker_check
  ignore_errors: true
  changed_when: false

- name: Install Docker
  block:
    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - gnupg
          - lsb-release
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Determine architecture
      set_fact:
        docker_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch={{ docker_arch }}] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true
  when: docker_check.rc != 0

- name: Ensure Docker is running
  systemd:
    name: docker
    enabled: true
    state: started

- name: Add user to docker group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

# ─── Install NVIDIA Container Toolkit ────────────
# This is what bridges Docker and the GPU driver.
# See docker-gpu-guide.md section 6 for the install chain:
#   NVIDIA Driver → NVIDIA Container Toolkit → Docker --gpus
- name: Check if nvidia-container-toolkit is installed
  command: nvidia-ctk --version
  register: ctk_check
  ignore_errors: true
  changed_when: false

- name: Install NVIDIA Container Toolkit
  block:
    - name: Add NVIDIA container toolkit keyring
      shell: |
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
          | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
      args:
        creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

    - name: Add NVIDIA container toolkit repo
      shell: |
        curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
          | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' \
          | tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
      args:
        creates: /etc/apt/sources.list.d/nvidia-container-toolkit.list

    - name: Install nvidia-container-toolkit
      apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: true

    - name: Configure Docker to use NVIDIA runtime
      command: nvidia-ctk runtime configure --runtime=docker
      notify: restart docker
  when: ctk_check.rc != 0

# ─── Verify GPU Access in Docker ─────────────────
# This is the critical test from docker-gpu-guide.md section 7
- name: Test GPU access inside Docker
  command: docker run --rm --gpus all nvidia/cuda:12.8.0-base-ubuntu24.04 nvidia-smi
  register: docker_gpu_test
  changed_when: false
  ignore_errors: true
  when: gpu_type == "discrete"

- name: Show Docker GPU test result
  debug:
    msg: "{{ docker_gpu_test.stdout_lines[:5] | default(['Test skipped or failed']) }}"
  when: gpu_type == "discrete"
